services:
  - type: web
    name: job-application-tracker
    runtime: go
    buildCommand: go build -o server .
    startCommand: ./server
    envVars:
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: APP_BASE_URL
        value: https://job-application-tracker.onrender.com
      - key: SESSION_SECRET
        generateValue: true
